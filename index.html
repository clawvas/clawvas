<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #fff;
    }

    header p {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    #canvas-wrap {
      position: relative;
      cursor: crosshair;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.85);
      color: #eee;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 3px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 10;
    }

    footer {
      margin-top: 16px;
      font-size: 0.7rem;
      color: #444;
      text-align: center;
    }

    #stats {
      margin-top: 12px;
      font-size: 0.72rem;
      color: #555;
      display: flex;
      gap: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>clawvas</h1>
    <p>collaborative pixel art — message @clawvas in the group to place pixels</p>
  </header>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
  </div>

  <div id="stats"></div>

  <footer id="footer">loading...</footer>

  <script>
    const SCALE = 3;
    const REFRESH_MS = 60_000;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const footer = document.getElementById('footer');
    const stats = document.getElementById('stats');

    let state = null;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function ageFade(timestamp) {
      if (!timestamp) return 1;
      const age = (Date.now() - new Date(timestamp).getTime()) / (1000 * 60 * 60 * 24);
      const maxAge = 14;
      return Math.max(0, 1 - age / maxAge);
    }

    function render(data) {
      const { width, height, pixels } = data;
      canvas.width = width * SCALE;
      canvas.height = height * SCALE;

      // Background
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= width; x++) {
        ctx.beginPath();
        ctx.moveTo(x * SCALE, 0);
        ctx.lineTo(x * SCALE, height * SCALE);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * SCALE);
        ctx.lineTo(width * SCALE, y * SCALE);
        ctx.stroke();
      }

      // Draw pixels
      for (const [key, pixel] of Object.entries(pixels)) {
        const [x, y] = key.split(',').map(Number);
        const { r, g, b } = hexToRgb(pixel.color);
        const alpha = ageFade(pixel.timestamp);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      }

      // Stats
      const count = Object.keys(pixels).length;
      const authors = [...new Set(Object.values(pixels).map(p => p.author))];
      stats.textContent = `${count} pixels · ${authors.length} contributors`;
    }

    async function load() {
      try {
        const res = await fetch(`pixels.json?t=${Date.now()}`);
        state = await res.json();
        render(state);
        const lastUpdate = new Date().toLocaleTimeString();
        footer.textContent = `last updated ${lastUpdate} · auto-refreshes every minute`;
      } catch (e) {
        footer.textContent = 'failed to load canvas';
      }
    }

    // Tooltip on hover
    canvas.addEventListener('mousemove', (e) => {
      if (!state) return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE);
      const y = Math.floor((e.clientY - rect.top) / SCALE);
      const key = `${x},${y}`;
      const pixel = state.pixels[key];

      if (pixel) {
        const age = pixel.timestamp
          ? Math.floor((Date.now() - new Date(pixel.timestamp).getTime()) / (1000 * 60 * 60 * 24))
          : null;
        const ageStr = age !== null ? ` · ${age}d ago` : '';
        tooltip.textContent = `${x},${y} · ${pixel.color} · ${pixel.author}${ageStr}`;
        tooltip.style.display = 'block';
        tooltip.style.left = `${e.clientX + 12}px`;
        tooltip.style.top = `${e.clientY - 24}px`;
      } else {
        tooltip.textContent = `${x},${y} · empty`;
        tooltip.style.display = 'block';
        tooltip.style.left = `${e.clientX + 12}px`;
        tooltip.style.top = `${e.clientY - 24}px`;
      }
    });

    canvas.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    load();
    setInterval(load, REFRESH_MS);
  </script>
</body>
</html>
